name: Build and deploy Node.js app to Azure Web App - fwc-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'   # 🔥 FIX: stable version

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

      - name: Prepare standalone build
        run: |
          mkdir -p .next/standalone/.next/static
          mkdir -p .next/standalone/public
          cp -r .next/static/. .next/standalone/.next/static/
          cp -r public/. .next/standalone/public/

      # ✅ DEBUG (very important)
      - name: Verify standalone output
        run: |
          echo "=== standalone ==="
          ls -la .next/standalone
          echo "=== static ==="
          ls -la .next/standalone/.next/static || echo "missing static"
          echo "=== public ==="
          ls -la .next/standalone/public || echo "missing public"
          echo "=== server ==="
          ls -la .next/standalone/server.js || echo "missing server.js"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          retention-days: 1
          include-hidden-files: true
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      # ✅ DEBUG AFTER DOWNLOAD
      - name: Verify downloaded files
        run: |
          echo "=== root ==="
          ls -la
          echo "=== .next ==="
          ls -la .next || echo "no .next"
          echo "=== static ==="
          ls -la .next/static || echo "no static"
          echo "=== public ==="
          ls -la public || echo "no public"
          echo "=== server ==="
          ls -la server.js || echo "no server.js"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'fwc-frontend'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B0C11488A3C74414BE776FA94059D0B3 }}